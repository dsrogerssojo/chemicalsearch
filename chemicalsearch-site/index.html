<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Internal SDS lookup library for searching chemical products, basic details, composition notes, and SDS references." />
    <meta name="theme-color" content="#05070b" />
    <title>Chemical Safety Lookup</title>
    <link rel="stylesheet" href="styles.css?v=20260608-homehide" />
    <style>
      #homeButton {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 9999;
        min-height: 42px;
        padding: 0 18px;
        border: 1px solid #ffffff;
        border-radius: 999px;
        background: #ffffff;
        color: #05070b;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 900;
        box-shadow: 0 10px 30px rgba(0,0,0,.35);
        cursor: pointer;
      }

      body.is-home-page #homeButton { display: none !important; }
      body.is-home-page .emergency-strip { padding-top: 0 !important; }
      .topbar { display: none !important; }
      .emergency-strip { padding-top: 58px !important; }

      .hero-inner {
        display: block !important;
        position: relative !important;
        min-height: 330px !important;
        padding: 42px 390px 38px 16px !important;
      }

      .hero-inner::after {
        display: none !important;
        content: none !important;
        background: none !important;
      }

      .hero-logo-panel {
        position: absolute !important;
        right: 16px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        width: 320px !important;
        max-width: 28vw !important;
        min-width: 220px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        pointer-events: none !important;
      }

      .hero-logo-panel img {
        width: 100% !important;
        max-width: 320px !important;
        height: auto !important;
        display: block !important;
        object-fit: contain !important;
        background: transparent !important;
        border: 0 !important;
      }

      .autofill-status.is-success { border-color: #a7e6cc !important; background: #e9fbf4 !important; color: #064e3b !important; }
      .autofill-status.is-loading { border-color: #b8d7f2 !important; background: #eaf4ff !important; color: #0d4d7d !important; }
      .autofill-status.is-error { border-color: #f2b8b0 !important; background: #fff0ed !important; color: #991b1b !important; }
      .autofill-status a { color: inherit !important; font-weight: 900 !important; }

      @media (max-width: 900px) {
        #homeButton { top: 10px; left: 10px; min-height: 38px; padding: 0 14px; font-size: 14px; }
        .emergency-strip { padding-top: 54px !important; }
        body.is-home-page .emergency-strip { padding-top: 0 !important; }
        .hero-inner { min-height: auto !important; padding: 28px 16px !important; }
        .hero-logo-panel { position: static !important; transform: none !important; width: 190px !important; max-width: 190px !important; min-width: 0 !important; justify-content: flex-start !important; margin-top: 22px !important; }
      }

      @media print {
        @page { margin: 0.55in; }
        #homeButton,
        .topbar,
        .emergency-strip,
        .hero,
        .footer,
        .search-panel,
        .filter-toolbar,
        .results-panel > .section-heading,
        .cards,
        .incident-grid,
        .detail-actions,
        .button,
        .nav-actions,
        .hero-logo-panel,
        .autofill-status,
        .form-actions { display: none !important; }
        html, body, .shell, .main, .panel, .detail-header, .sds-section-grid .panel, .hazard-overview .panel { background: #ffffff !important; color: #000000 !important; }
        body { font-family: Arial, Helvetica, sans-serif !important; font-size: 10.5pt !important; line-height: 1.35 !important; }
        .main { display: block !important; width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
        .panel, .detail-header, .sds-section-grid .panel, .hazard-overview .panel { border: 1px solid #bdbdbd !important; border-radius: 0 !important; padding: 10px !important; margin: 0 0 10px !important; break-inside: avoid !important; }
        .detail-header { border: 0 !important; border-bottom: 2px solid #000000 !important; padding: 0 0 10px !important; }
        .detail-title, h1 { color: #000000 !important; font-size: 20pt !important; line-height: 1.1 !important; margin: 4px 0 6px !important; }
        h2 { color: #000000 !important; font-size: 12pt !important; margin: 0 0 6px !important; }
        p, .meta, .detail-meta, .summary-list dd, .panel p { color: #000000 !important; font-size: 10pt !important; }
        .sds-section-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
        .sds-section-grid .panel:nth-child(6), .sds-section-grid .panel:has(a[href]) { display: none !important; }
        a[href]::after { content: "" !important; }
      }
    </style>
  </head>
  <body>
    <button id="homeButton" type="button">← Home</button>
    <div id="app"></div>
    <script>
      function syncHomeButtonVisibility() {
        var route = location.hash.replace(/^#\/?/, "").split("/")[0];
        var isHome = !route;
        document.body.classList.toggle("is-home-page", isHome);
      }

      document.getElementById("homeButton").addEventListener("click", function () {
        location.hash = "#/";
        syncHomeButtonVisibility();
        setTimeout(function () { window.scrollTo(0, 0); }, 0);
      });
      window.addEventListener("hashchange", syncHomeButtonVisibility);
      syncHomeButtonVisibility();
    </script>
    <script src="sds-data-1.js?v=20260608-homehide"></script>
    <script src="sds-data-2.js?v=20260608-homehide"></script>
    <script src="sds-data-3.js?v=20260608-homehide"></script>
    <script src="sds-data-4.js?v=20260608-homehide"></script>
    <script src="sds-data-5.js?v=20260608-homehide"></script>
    <script src="sds-data-6.js?v=20260608-homehide"></script>
    <script src="app.js?v=20260608-homehide"></script>
    <script src="enhancements.js?v=20260608-homehide"></script>
    <script src="autofill-client.js?v=20260608-homehide"></script>
    <script>
      (function () {
        var SOJO_LOGO_URL = "https://techcouncilventures.com/wp-content/uploads/2023/10/Sojo-Logo.png";
        function fixHeroLogo() {
          var hero = document.querySelector(".hero-inner");
          if (!hero) return;
          hero.querySelectorAll(".hero-logo-panel").forEach(function (node) { node.remove(); });
          var panel = document.createElement("div");
          panel.className = "hero-logo-panel";
          var img = document.createElement("img");
          img.src = SOJO_LOGO_URL;
          img.alt = "SOJO";
          img.loading = "eager";
          panel.appendChild(img);
          hero.appendChild(panel);
        }
        fixHeroLogo();
        new MutationObserver(function () { window.requestAnimationFrame(fixHeroLogo); }).observe(document.getElementById("app"), { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
