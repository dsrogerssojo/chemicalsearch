    <style id="final-hero-logo-layout">

        top: 14px !important;
        left: 14px !important;
        z-index: 9999 !important;
        min-height: 42px !important;
        padding: 0 18px !important;
        border: 1px solid #ffffff !important;
        border-radius: 999px !important;
        background: #ffffff !important;
        color: #05070b !important;
        font-family: Arial, Helvetica, sans-serif !important;
        font-size: 15px !important;
        font-weight: 900 !important;
        box-shadow: 0 10px 30px rgba(0,0,0,.35) !important;
        cursor: pointer !important;
      }

      #homeButton[hidden],

      .home-button-fixed {

      }

        width: 320px !important;
        max-width: 28vw !important;
        min-width: 220px !important;
        height: auto !important;
        display: flex !important;
        justify-content: center !important;

      }

        height: auto !important;
        display: block !important;
        object-fit: contain !important;
        background: transparent !important;
        border: 0 !important;
      }

      }

      .hero .lead {
        max-width: 760px !important;
      }

        background: #e9fbf4 !important;
        color: #064e3b !important;
      }

        border-color: #b8d7f2 !important;

        color: #991b1b !important;
      }

      }

          padding: 0 14px !important;

        }

        body:not(.is-home-page) .emergency-strip {
          padding-top: 54px !important;
        }

        .hero-inner {
          min-height: auto !important;
          padding: 28px 16px !important;
        }

        .hero-logo-panel {
          position: static !important;
          transform: none !important;
          width: 190px !important;
          max-width: 190px !important;
          min-width: 0 !important;
          justify-content: flex-start !important;
          margin-top: 22px !important;

      }

      @media print {

          margin: 0.55in;
          size: auto;
        }

        * {
          box-shadow: none !important;
          text-shadow: none !important;
          animation: none !important;
          transition: none !important;
        }

        html,
        body,
        .shell,
        .main,
        .panel,
        .detail-header,
        .incident-card,
        .sds-section-grid .panel,

        }

          line-height: 1.35 !important;
        }

        #homeButton,
        .home-button-fixed,
        .topbar,
        .emergency-strip,
        .hero,
        .footer,
        .search-panel,
        .filter-toolbar,
        .results-panel > .section-heading,
        .cards,
        .incident-grid,
        .detail-actions,
        .button,
        .nav-actions,
        .hero-logo-panel,
        .autofill-status,
        .form-actions {
          display: none !important;
        }

        .main {
          display: block !important;
          width: 100% !important;
          max-width: none !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        .panel,
        .detail-header,
        .incident-card,
        .sds-section-grid .panel,
        .hazard-overview .panel {
          border: 1px solid #bdbdbd !important;
          border-radius: 0 !important;
          padding: 10px !important;
          margin: 0 0 10px !important;
          break-inside: avoid !important;
          page-break-inside: avoid !important;
        }

        .detail-header {
          border: 0 !important;
          border-bottom: 2px solid #000000 !important;
          padding: 0 0 10px !important;
          margin-bottom: 12px !important;
        }

        .eyebrow {
          background: transparent !important;
          color: #000000 !important;
          padding: 0 !important;
          letter-spacing: 0.04em !important;

        }

        .detail-title,
        h1 {
          color: #000000 !important;
          font-size: 20pt !important;
          line-height: 1.1 !important;
          margin: 4px 0 6px !important;
        }

        h2 {
          color: #000000 !important;
          font-size: 12pt !important;
          margin: 0 0 6px !important;
        }

        p,
        .meta,
        .detail-meta,
        .summary-list dd,
        .panel p {
          color: #000000 !important;
          font-size: 10pt !important;
        }

        .hazard-overview {
          display: grid !important;
          grid-template-columns: 150px 1fr !important;
          gap: 10px !important;
          margin-bottom: 10px !important;
        }

        .nfpa-card {
          padding: 8px !important;
        }

        .nfpa-diamond {
          width: 92px !important;
          height: 92px !important;
          margin: 8px auto !important;
        }

        .nfpa-cell {
          width: 45px !important;
          height: 45px !important;
          font-size: 10pt !important;
          border: 1px solid #000000 !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        .nfpa-health { left: 0 !important; top: 23px !important; }
        .nfpa-fire { left: 23px !important; top: 0 !important; }
        .nfpa-reactivity { right: 0 !important; top: 23px !important; }
        .nfpa-special { left: 23px !important; bottom: 0 !important; }

        .card-badges {
          margin-top: 6px !important;
        }

        .risk-pill,
        .ghs-pill {
          border: 1px solid #777777 !important;
          background: #ffffff !important;
          color: #000000 !important;
          padding: 2px 6px !important;
          font-size: 8pt !important;
        }

        .sds-section-grid {
          display: grid !important;
          grid-template-columns: 1fr 1fr !important;
          gap: 10px !important;
        }

        .sds-section-grid .panel:nth-child(6),
        .sds-section-grid .panel:has(a[href]) {
          display: none !important;
        }

        .summary-list div {
          display: grid !important;
          grid-template-columns: 110px 1fr !important;
          gap: 8px !important;
          padding: 4px 0 !important;
          border-bottom: 1px solid #dddddd !important;
        }

        .summary-list dt,
        .summary-list dd {
          color: #000000 !important;
          margin: 0 !important;
          font-size: 9.5pt !important;
        }

        a[href]::after {
          content: "" !important;
        }
      }
    </style>
    <script>
      (function () {
        var SOJO_LOGO_URL = 'https://techcouncilventures.com/wp-content/uploads/2023/10/Sojo-Logo.png';
        var fixing = false;
        var homeButton = document.getElementById('homeButton');

        function routeName() {
          return location.hash.replace(/^#\/?/, '').split('/')[0];
        }

        function syncHomeButton() {
          var isHome = !routeName();
          document.body.classList.toggle('is-home-page', isHome);
          document.querySelectorAll('.home-button-fixed').forEach(function (node) { node.remove(); });
          if (homeButton) homeButton.hidden = isHome;
        }

        if (homeButton) {
          homeButton.addEventListener('click', function () {
            location.hash = '#/';
            syncHomeButton();
            setTimeout(function () { window.scrollTo(0, 0); }, 0);
          });
        }

        function fixHeroLogo() {
          if (fixing) return;
          fixing = true;
          try {
            syncHomeButton();
            var hero = document.querySelector('.hero-inner');
            if (!hero) return;

            hero.querySelectorAll('.hero-logo-panel').forEach(function (node) {
              node.remove();
            });

            var panel = document.createElement('div');
            panel.className = 'hero-logo-panel';

            var img = document.createElement('img');
            img.src = SOJO_LOGO_URL;
            img.alt = 'SOJO';
            img.loading = 'eager';

            panel.appendChild(img);
            hero.appendChild(panel);
          } finally {
            fixing = false;
          }
        }

        syncHomeButton();
        fixHeroLogo();
        window.addEventListener('hashchange', syncHomeButton);
        new MutationObserver(function () {
          window.requestAnimationFrame(fixHeroLogo);
        }).observe(document.getElementById('app') || document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
