<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Internal chemical safety library for searching chemical profiles, SDS references, PPE, hazards, storage, disposal, and add-chemical review requests."
    />
    <meta name="theme-color" content="#15354f" />
    <title>Chemical Safety Lookup</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .trust-row,
      .filter-row,
      .hazard-rail,
      .badge,
      .detail-kicker,
      .banner.warning {
        display: none !important;
      }

      .chemical-card {
        display: block !important;
        grid-template-columns: 1fr !important;
      }

      .detail-header {
        grid-template-columns: minmax(0, 1fr) auto !important;
      }

      @media (max-width: 820px) {
        .detail-header {
          grid-template-columns: minmax(0, 1fr) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js"></script>
  </body>
</html>
