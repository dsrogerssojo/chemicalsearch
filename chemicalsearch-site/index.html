<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Internal SDS lookup library for searching chemical products, basic details, composition notes, and SDS references." />
    <meta name="theme-color" content="#05070b" />
    <title>Chemical Safety Lookup</title>
    <link rel="stylesheet" href="styles.css?v=20260608-workflow-start" />
  </head>
  <body>
    <button id="homeButton" type="button" hidden>← Home</button>
    <div id="app"></div>
    <script>
      window.CHEMICALSEARCH_API_URL = localStorage.getItem("chemicalsearch.apiBaseUrl") || "";
    </script>
    <script src="sds-data-1.js?v=20260608-workflow-start"></script>
    <script src="sds-data-2.js?v=20260608-workflow-start"></script>
    <script src="sds-data-3.js?v=20260608-workflow-start"></script>
    <script src="sds-data-4.js?v=20260608-workflow-start"></script>
    <script src="sds-data-5.js?v=20260608-workflow-start"></script>
    <script src="sds-data-6.js?v=20260608-workflow-start"></script>
    <script src="sds-approved.js?v=20260608-workflow-start"></script>
    <script src="app.js?v=20260608-workflow-start"></script>
    <script src="enhancements.js?v=20260608-workflow-start"></script>
    <script src="autofill-client.js?v=20260608-workflow-start"></script>
    <script>
      (function () {
        var SOJO_LOGO_URL = 'https://techcouncilventures.com/wp-content/uploads/2023/10/Sojo-Logo.png';
        var fixing = false;
        var homeButton = document.getElementById('homeButton');

        function routeName() {
          return location.hash.replace(/^#\/?/, '').split('/')[0];
        }

        function syncHomeButton() {
          var isHome = !routeName();
          document.body.classList.toggle('is-home-page', isHome);
          document.querySelectorAll('.home-button-fixed').forEach(function (node) { node.remove(); });
          if (homeButton) homeButton.hidden = isHome;
        }

        if (homeButton) {
          homeButton.addEventListener('click', function () {
            location.hash = '#/';
            syncHomeButton();
            setTimeout(function () { window.scrollTo(0, 0); }, 0);
          });
        }

        function fixHeroLogo() {
          if (fixing) return;
          fixing = true;
          try {
            syncHomeButton();
            var hero = document.querySelector('.hero-inner');
            if (!hero) return;

            hero.querySelectorAll('.hero-logo-panel').forEach(function (node) {
              node.remove();
            });

            var panel = document.createElement('div');
            panel.className = 'hero-logo-panel';

            var img = document.createElement('img');
            img.src = SOJO_LOGO_URL;
            img.alt = 'SOJO';
            img.loading = 'eager';

            panel.appendChild(img);
            hero.appendChild(panel);
          } finally {
            fixing = false;
          }
        }

        syncHomeButton();
        fixHeroLogo();
        window.addEventListener('hashchange', syncHomeButton);
        new MutationObserver(function () {
          window.requestAnimationFrame(fixHeroLogo);
        }).observe(document.getElementById('app') || document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
